<svg viewBox="0 0 1920 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradients -->
    <linearGradient id="cellarBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0808;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0a0505;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0505;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="barrelWood" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3D0C11;stop-opacity:0.9" />
      <stop offset="50%" style="stop-color:#4a1a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3D0C11;stop-opacity:0.9" />
    </linearGradient>

    <radialGradient id="barrelEnd" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#5a2222;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#4a1a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3D0C11;stop-opacity:1" />
    </radialGradient>

    <linearGradient id="stoneArch" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2a1515;stop-opacity:0.8" />
      <stop offset="50%" style="stop-color:#1a0a0a;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#0a0505;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="lightRay1" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" style="stop-color:#C5A55A;stop-opacity:0.4" />
      <stop offset="50%" style="stop-color:#C5A55A;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#C5A55A;stop-opacity:0" />
    </linearGradient>

    <linearGradient id="lightRay2" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" style="stop-color:#8B7942;stop-opacity:0.35" />
      <stop offset="50%" style="stop-color:#8B7942;stop-opacity:0.12" />
      <stop offset="100%" style="stop-color:#8B7942;stop-opacity:0" />
    </linearGradient>

    <linearGradient id="lightRay3" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" style="stop-color:#F5F0E8;stop-opacity:0.25" />
      <stop offset="50%" style="stop-color:#F5F0E8;stop-opacity:0.08" />
      <stop offset="100%" style="stop-color:#F5F0E8;stop-opacity:0" />
    </linearGradient>

    <!-- Filters -->
    <filter id="blur">
      <feGaussianBlur stdDeviation="3"/>
    </filter>

    <filter id="softBlur">
      <feGaussianBlur stdDeviation="6"/>
    </filter>

    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1920" height="600" fill="url(#cellarBg)"/>

  <!-- Stone arch ceiling -->
  <path d="M 0 0 Q 480 120 960 130 Q 1440 120 1920 0 L 1920 150 Q 1440 180 960 185 Q 480 180 0 150 Z"
        fill="url(#stoneArch)" opacity="0.9"/>

  <!-- Arch details -->
  <path d="M 0 20 Q 480 135 960 145 Q 1440 135 1920 20"
        stroke="#1a0808" stroke-width="3" fill="none" opacity="0.6"/>
  <path d="M 0 50 Q 480 150 960 160 Q 1440 150 1920 50"
        stroke="#0a0505" stroke-width="2" fill="none" opacity="0.5"/>

  <!-- Ambient light rays from ceiling -->
  <g opacity="0.8" filter="url(#softBlur)">
    <polygon points="400,80 380,600 420,600" fill="url(#lightRay1)"/>
    <polygon points="750,90 735,600 765,600" fill="url(#lightRay2)"/>
    <polygon points="960,95 945,600 975,600" fill="url(#lightRay3)"/>
    <polygon points="1200,90 1185,600 1215,600" fill="url(#lightRay1)"/>
    <polygon points="1500,85 1485,600 1515,600" fill="url(#lightRay2)"/>
  </g>

  <!-- Floor reflection -->
  <rect x="0" y="520" width="1920" height="80" fill="#0a0505" opacity="0.7"/>

  <!-- Wine barrels - back row (smaller, darker) -->
  <g opacity="0.7">
    <!-- Barrel 1 -->
    <ellipse cx="250" cy="300" rx="65" ry="55" fill="url(#barrelEnd)"/>
    <rect x="185" y="300" width="130" height="150" rx="8" fill="url(#barrelWood)"/>
    <ellipse cx="250" cy="450" rx="65" ry="20" fill="#3D0C11"/>
    <line x1="185" y1="340" x2="315" y2="340" stroke="#2a1010" stroke-width="2"/>
    <line x1="185" y1="410" x2="315" y2="410" stroke="#2a1010" stroke-width="2"/>

    <!-- Barrel 2 -->
    <ellipse cx="550" cy="290" rx="70" ry="58" fill="url(#barrelEnd)"/>
    <rect x="480" y="290" width="140" height="160" rx="8" fill="url(#barrelWood)"/>
    <ellipse cx="550" cy="450" rx="70" ry="22" fill="#3D0C11"/>
    <line x1="480" y1="335" x2="620" y2="335" stroke="#2a1010" stroke-width="2"/>
    <line x1="480" y1="405" x2="620" y2="405" stroke="#2a1010" stroke-width="2"/>

    <!-- Barrel 3 -->
    <ellipse cx="900" cy="295" rx="68" ry="56" fill="url(#barrelEnd)"/>
    <rect x="832" y="295" width="136" height="155" rx="8" fill="url(#barrelWood)"/>
    <ellipse cx="900" cy="450" rx="68" ry="21" fill="#3D0C11"/>
    <line x1="832" y1="338" x2="968" y2="338" stroke="#2a1010" stroke-width="2"/>
    <line x1="832" y1="407" x2="968" y2="407" stroke="#2a1010" stroke-width="2"/>

    <!-- Barrel 4 -->
    <ellipse cx="1250" cy="292" rx="69" ry="57" fill="url(#barrelEnd)"/>
    <rect x="1181" y="292" width="138" height="158" rx="8" fill="url(#barrelWood)"/>
    <ellipse cx="1250" cy="450" rx="69" ry="21" fill="#3D0C11"/>
    <line x1="1181" y1="336" x2="1319" y2="336" stroke="#2a1010" stroke-width="2"/>
    <line x1="1181" y1="406" x2="1319" y2="406" stroke="#2a1010" stroke-width="2"/>

    <!-- Barrel 5 -->
    <ellipse cx="1600" cy="298" rx="67" ry="55" fill="url(#barrelEnd)"/>
    <rect x="1533" y="298" width="134" height="152" rx="8" fill="url(#barrelWood)"/>
    <ellipse cx="1600" cy="450" rx="67" ry="20" fill="#3D0C11"/>
    <line x1="1533" y1="340" x2="1667" y2="340" stroke="#2a1010" stroke-width="2"/>
    <line x1="1533" y1="408" x2="1667" y2="408" stroke="#2a1010" stroke-width="2"/>
  </g>

  <!-- Wine barrels - front row (larger, brighter) -->
  <g>
    <!-- Barrel A -->
    <ellipse cx="150" cy="400" rx="85" ry="70" fill="url(#barrelEnd)"/>
    <rect x="65" y="400" width="170" height="180" rx="10" fill="url(#barrelWood)"/>
    <ellipse cx="150" cy="580" rx="85" ry="25" fill="#3D0C11"/>
    <line x1="65" y1="445" x2="235" y2="445" stroke="#2a1010" stroke-width="3" opacity="0.8"/>
    <line x1="65" y1="535" x2="235" y2="535" stroke="#2a1010" stroke-width="3" opacity="0.8"/>
    <circle cx="150" cy="490" r="8" fill="#8B7942" opacity="0.7"/>
    <ellipse cx="90" cy="470" rx="8" ry="25" fill="#C5A55A" opacity="0.15" filter="url(#blur)"/>

    <!-- Barrel B -->
    <ellipse cx="450" cy="395" rx="88" ry="72" fill="url(#barrelEnd)"/>
    <rect x="362" y="395" width="176" height="185" rx="10" fill="url(#barrelWood)"/>
    <ellipse cx="450" cy="580" rx="88" ry="26" fill="#3D0C11"/>
    <line x1="362" y1="442" x2="538" y2="442" stroke="#2a1010" stroke-width="3" opacity="0.8"/>
    <line x1="362" y1="533" x2="538" y2="533" stroke="#2a1010" stroke-width="3" opacity="0.8"/>
    <circle cx="450" cy="488" r="9" fill="#8B7942" opacity="0.7"/>
    <ellipse cx="390" cy="465" rx="9" ry="28" fill="#C5A55A" opacity="0.18" filter="url(#blur)"/>

    <!-- Barrel C (center, featured) -->
    <ellipse cx="800" cy="390" rx="90" ry="75" fill="url(#barrelEnd)" filter="url(#glow)"/>
    <rect x="710" y="390" width="180" height="190" rx="10" fill="url(#barrelWood)"/>
    <ellipse cx="800" cy="580" rx="90" ry="27" fill="#3D0C11"/>
    <line x1="710" y1="438" x2="890" y2="438" stroke="#2a1010" stroke-width="3" opacity="0.8"/>
    <line x1="710" y1="532" x2="890" y2="532" stroke="#2a1010" stroke-width="3" opacity="0.8"/>
    <circle cx="800" cy="485" r="10" fill="#8B7942" opacity="0.8"/>
    <ellipse cx="735" cy="460" rx="10" ry="30" fill="#C5A55A" opacity="0.2" filter="url(#blur)"/>
    <circle cx="800" cy="420" r="120" fill="#C5A55A" opacity="0.08" filter="url(#softBlur)"/>

    <!-- Barrel D -->
    <ellipse cx="1150" cy="398" rx="87" ry="71" fill="url(#barrelEnd)"/>
    <rect x="1063" y="398" width="174" height="182" rx="10" fill="url(#barrelWood)"/>
    <ellipse cx="1150" cy="580" rx="87" ry="26" fill="#3D0C11"/>
    <line x1="1063" y1="444" x2="1237" y2="444" stroke="#2a1010" stroke-width="3" opacity="0.8"/>
    <line x1="1063" y1="534" x2="1237" y2="534" stroke="#2a1010" stroke-width="3" opacity="0.8"/>
    <circle cx="1150" cy="489" r="9" fill="#8B7942" opacity="0.7"/>
    <ellipse cx="1090" cy="468" rx="9" ry="27" fill="#C5A55A" opacity="0.17" filter="url(#blur)"/>

    <!-- Barrel E -->
    <ellipse cx="1500" cy="403" rx="84" ry="69" fill="url(#barrelEnd)"/>
    <rect x="1416" y="403" width="168" height="177" rx="10" fill="url(#barrelWood)"/>
    <ellipse cx="1500" cy="580" rx="84" ry="25" fill="#3D0C11"/>
    <line x1="1416" y1="448" x2="1584" y2="448" stroke="#2a1010" stroke-width="3" opacity="0.8"/>
    <line x1="1416" y1="536" x2="1584" y2="536" stroke="#2a1010" stroke-width="3" opacity="0.8"/>
    <circle cx="1500" cy="492" r="8" fill="#8B7942" opacity="0.7"/>
    <ellipse cx="1442" cy="472" rx="8" ry="26" fill="#C5A55A" opacity="0.16" filter="url(#blur)"/>

    <!-- Barrel F -->
    <ellipse cx="1770" cy="405" rx="82" ry="68" fill="url(#barrelEnd)"/>
    <rect x="1688" y="405" width="164" height="175" rx="10" fill="url(#barrelWood)"/>
    <ellipse cx="1770" cy="580" rx="82" ry="24" fill="#3D0C11"/>
    <line x1="1688" y1="450" x2="1852" y2="450" stroke="#2a1010" stroke-width="3" opacity="0.8"/>
    <line x1="1688" y1="538" x2="1852" y2="538" stroke="#2a1010" stroke-width="3" opacity="0.8"/>
    <circle cx="1770" cy="494" r="8" fill="#8B7942" opacity="0.7"/>
    <ellipse cx="1715" cy="475" rx="8" ry="25" fill="#C5A55A" opacity="0.15" filter="url(#blur)"/>
  </g>

  <!-- Ambient particles and dust in light rays -->
  <circle cx="410" cy="250" r="2" fill="#C5A55A" opacity="0.5" filter="url(#blur)"/>
  <circle cx="760" cy="320" r="1.5" fill="#F5F0E8" opacity="0.4"/>
  <circle cx="970" cy="280" r="2.5" fill="#C5A55A" opacity="0.6" filter="url(#blur)"/>
  <circle cx="1210" cy="310" r="2" fill="#8B7942" opacity="0.5"/>
  <circle cx="1490" cy="260" r="1.8" fill="#C5A55A" opacity="0.55" filter="url(#blur)"/>
  <circle cx="395" cy="400" r="1.5" fill="#F5F0E8" opacity="0.35"/>
  <circle cx="745" cy="450" r="2" fill="#C5A55A" opacity="0.45"/>
  <circle cx="1195" cy="420" r="1.7" fill="#8B7942" opacity="0.5"/>

  <!-- Floor shadows -->
  <ellipse cx="150" cy="585" rx="90" ry="15" fill="#0a0505" opacity="0.6"/>
  <ellipse cx="450" cy="585" rx="93" ry="16" fill="#0a0505" opacity="0.6"/>
  <ellipse cx="800" cy="585" rx="95" ry="17" fill="#0a0505" opacity="0.7"/>
  <ellipse cx="1150" cy="585" rx="92" ry="16" fill="#0a0505" opacity="0.6"/>
  <ellipse cx="1500" cy="585" rx="89" ry="15" fill="#0a0505" opacity="0.6"/>
  <ellipse cx="1770" cy="585" rx="87" ry="14" fill="#0a0505" opacity="0.6"/>
</svg>