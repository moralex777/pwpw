<svg viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradients -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0505;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1a0808;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0505;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="bottleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2a1515;stop-opacity:0.9" />
      <stop offset="50%" style="stop-color:#1a0808;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0505;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="wineFlow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#722F37;stop-opacity:0.95" />
      <stop offset="30%" style="stop-color:#8B3A44;stop-opacity:0.9" />
      <stop offset="60%" style="stop-color:#722F37;stop-opacity:0.85" />
      <stop offset="100%" style="stop-color:#3D0C11;stop-opacity:0.95" />
    </linearGradient>

    <radialGradient id="glassGlow" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#C5A55A;stop-opacity:0.6" />
      <stop offset="50%" style="stop-color:#C5A55A;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#C5A55A;stop-opacity:0" />
    </radialGradient>

    <radialGradient id="wineInGlass" cx="50%" cy="80%">
      <stop offset="0%" style="stop-color:#8B3A44;stop-opacity:0.95" />
      <stop offset="60%" style="stop-color:#722F37;stop-opacity:0.98" />
      <stop offset="100%" style="stop-color:#3D0C11;stop-opacity:1" />
    </radialGradient>

    <linearGradient id="goldRim" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8B7942;stop-opacity:0.7" />
      <stop offset="50%" style="stop-color:#C5A55A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B7942;stop-opacity:0.7" />
    </linearGradient>

    <radialGradient id="spotlight" cx="50%" cy="30%">
      <stop offset="0%" style="stop-color:#3D0C11;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#0a0505;stop-opacity:0" />
    </radialGradient>

    <!-- Filters -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="shimmer">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1920" height="1080" fill="url(#bgGrad)"/>

  <!-- Atmospheric circles -->
  <circle cx="960" cy="400" r="600" fill="url(#spotlight)" opacity="0.5"/>
  <circle cx="750" cy="350" r="150" fill="#722F37" opacity="0.05"/>
  <circle cx="1150" cy="450" r="200" fill="#3D0C11" opacity="0.08"/>
  <circle cx="850" cy="600" r="180" fill="#722F37" opacity="0.06"/>

  <!-- Bottle silhouette (tilted) -->
  <g transform="translate(650, 200) rotate(-25)">
    <!-- Bottle body -->
    <path d="M 80 0 L 120 0 L 120 40 L 110 50 L 110 280 L 90 280 L 90 50 L 80 40 Z"
          fill="url(#bottleGrad)" opacity="0.95"/>

    <!-- Bottle neck -->
    <rect x="85" y="0" width="30" height="50" fill="#1a0808" opacity="0.9"/>

    <!-- Bottle highlight -->
    <ellipse cx="92" cy="100" rx="8" ry="40" fill="#C5A55A" opacity="0.15" filter="url(#shimmer)"/>

    <!-- Bottle top -->
    <ellipse cx="100" cy="0" rx="20" ry="8" fill="#0a0505" opacity="0.95"/>

    <!-- Cork -->
    <rect x="92" y="-15" width="16" height="15" fill="#8B7942" opacity="0.8"/>

    <!-- Glass shine on bottle -->
    <path d="M 95 60 Q 88 120 92 180" stroke="#F5F0E8" stroke-width="2" fill="none" opacity="0.2"/>
    <path d="M 105 80 Q 112 140 108 200" stroke="#F5F0E8" stroke-width="1.5" fill="none" opacity="0.15"/>
  </g>

  <!-- Wine stream pouring -->
  <g opacity="0.95">
    <!-- Main flow -->
    <path d="M 770 380 Q 820 450 870 520 Q 900 570 920 620"
          stroke="url(#wineFlow)" stroke-width="28" fill="none" opacity="0.9" filter="url(#softGlow)"/>

    <!-- Secondary flow streams -->
    <path d="M 775 390 Q 825 455 875 525 Q 905 575 925 620"
          stroke="#8B3A44" stroke-width="18" fill="none" opacity="0.6"/>
    <path d="M 765 385 Q 815 448 865 518 Q 895 568 915 620"
          stroke="#3D0C11" stroke-width="22" fill="none" opacity="0.5"/>

    <!-- Flow highlights -->
    <path d="M 768 382 Q 818 448 868 518"
          stroke="#C5A55A" stroke-width="3" fill="none" opacity="0.25" filter="url(#shimmer)"/>

    <!-- Droplets -->
    <circle cx="810" cy="440" r="6" fill="#722F37" opacity="0.8" filter="url(#glow)"/>
    <circle cx="850" cy="500" r="5" fill="#8B3A44" opacity="0.75" filter="url(#glow)"/>
    <circle cx="880" cy="560" r="7" fill="#722F37" opacity="0.85" filter="url(#glow)"/>
    <circle cx="905" cy="600" r="4" fill="#3D0C11" opacity="0.7"/>
  </g>

  <!-- Wine glass -->
  <g transform="translate(960, 680)">
    <!-- Glass glow background -->
    <ellipse cx="0" cy="0" rx="180" ry="180" fill="url(#glassGlow)" opacity="0.4" filter="url(#softGlow)"/>

    <!-- Glass stem base -->
    <ellipse cx="0" cy="120" rx="50" ry="12" fill="#1a0808" opacity="0.9"/>

    <!-- Glass stem -->
    <rect x="-8" y="20" width="16" height="100" fill="#2a1515" opacity="0.8"/>

    <!-- Glass bowl outline -->
    <path d="M -80 -40 Q -90 -20 -90 20 L -90 80 Q -90 100 -70 110 L -10 120 L 10 120 L 70 110 Q 90 100 90 80 L 90 20 Q 90 -20 80 -40 Z"
          fill="none" stroke="#F5F0E8" stroke-width="3" opacity="0.6" filter="url(#glow)"/>

    <!-- Wine in glass -->
    <path d="M -85 30 L -85 80 Q -85 95 -68 105 L -10 115 L 10 115 L 68 105 Q 85 95 85 80 L 85 30 Z"
          fill="url(#wineInGlass)" opacity="0.95"/>

    <!-- Wine surface reflection -->
    <ellipse cx="0" cy="30" rx="85" ry="15" fill="#C5A55A" opacity="0.15" filter="url(#shimmer)"/>

    <!-- Glass reflections -->
    <path d="M -75 -30 Q -78 0 -80 40" stroke="#F5F0E8" stroke-width="2" fill="none" opacity="0.35"/>
    <path d="M -70 -25 Q -72 10 -74 50" stroke="#F5F0E8" stroke-width="1.5" fill="none" opacity="0.25"/>
    <path d="M 75 -30 Q 78 0 80 40" stroke="#F5F0E8" stroke-width="2" fill="none" opacity="0.3"/>

    <!-- Gold rim -->
    <ellipse cx="0" cy="-40" rx="82" ry="12" fill="url(#goldRim)" opacity="0.9" filter="url(#glow)"/>

    <!-- Rim highlight -->
    <ellipse cx="0" cy="-41" rx="82" ry="3" fill="#C5A55A" opacity="0.6"/>

    <!-- Glass shine highlights -->
    <ellipse cx="-60" cy="10" rx="12" ry="35" fill="#F5F0E8" opacity="0.2" filter="url(#shimmer)"/>
    <ellipse cx="65" cy="20" rx="10" ry="30" fill="#F5F0E8" opacity="0.15" filter="url(#shimmer)"/>
  </g>

  <!-- Ambient light particles -->
  <circle cx="600" cy="300" r="3" fill="#C5A55A" opacity="0.4" filter="url(#glow)"/>
  <circle cx="1300" cy="400" r="2.5" fill="#C5A55A" opacity="0.35" filter="url(#glow)"/>
  <circle cx="750" cy="550" r="2" fill="#C5A55A" opacity="0.3"/>
  <circle cx="1150" cy="350" r="3.5" fill="#C5A55A" opacity="0.45" filter="url(#glow)"/>
  <circle cx="850" cy="250" r="2" fill="#F5F0E8" opacity="0.25"/>
  <circle cx="1050" cy="500" r="2.5" fill="#F5F0E8" opacity="0.3"/>
</svg>